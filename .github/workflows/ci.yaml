name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go:
          - "1.25"
          - "1.26"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go (${{ matrix.go }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Build (${{ matrix.go }})
        run: go build ./...

      - name: Build Sentry Module (${{ matrix.go }})
        run: cd sentry && go build ./...
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go:
          - "1.25"
          - "1.26"
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go (${{ matrix.go }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go }}

    - name: Build (${{ matrix.go }})
      run: go build ./...

    - name: Test (${{ matrix.go }})
      run: go test ./...

    - name: Check Root Dependencies (${{ matrix.go }})
      run: |
        deps="$(go list -deps ./...)"
        if echo "$deps" | grep -E 'github.com/getsentry|sentry-go'; then
          echo "root module unexpectedly depends on sentry-go" >&2
          exit 1
        fi

    - name: Test Sentry Module (${{ matrix.go }})
      run: cd sentry && go test ./...

    - name: Check Sentry Module Dependencies (${{ matrix.go }})
      run: cd sentry && go list -deps ./... | grep 'github.com/getsentry/sentry-go' >/dev/null

    - name: Tidy (${{ matrix.go }})
      run: |
        go mod tidy
        (cd sentry && go mod tidy)
        git diff --exit-code -- go.mod go.sum sentry/go.mod sentry/go.sum
